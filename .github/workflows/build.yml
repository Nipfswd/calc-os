name: Build CalcOS

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mtools \
            nasm \
            qemu-system-x86

      - name: Build OS image
        run: |
          make

      - name: Upload OS image
        uses: actions/upload-artifact@v4
        with:
          name: calc-os-image
          path: os-image.img